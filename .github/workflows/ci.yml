name: PYTHON CI
on:
    push:
      branches: ["main"]
    pull_request:
      branches: ["main"]
    workflow_dispatch: 

permissions:
  contents: read
    
jobs:
  test:
    name: Test Python ${{matrix.python-version}}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
        - name: Checkout repository
          uses: actions/checkout@v6

        - name: Set up Python
          uses: actions/setup-python@v6
          with: 
            python-version: ${{matrix.python-version}}
            cache: "pip"

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            python -m pip install pytest ruff mypy
            python -m pip install -e 

        - name: Run tests
          run: python -m pytest
      
        - name: Run ruff check
          run: ruff check .
        - name: Rum ruff format
          run: ruff format
        - name: Check mypy type
          run: mypy src

         